<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Result Database</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 0;
      color: #333;
    }

    h1 {
      text-align: center;
      color: white;
      margin-top: 20px;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: white;
      padding: 25px;
      margin: 30px auto;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 10px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .add-btn {
      background: #28a745;
    }

    .add-btn:hover {
      background: #218838;
    }

    .clear-btn {
      background: #dc3545;
    }

    .clear-btn:hover {
      background: #c82333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #667eea;
      color: white;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    tr:hover {
      background: #e6ecff;
    }
  </style>
</head>

<body>

  <h1>🎓 Student Result System</h1>

  <div class="container">

    <label>Student Name</label>
    <input type="text" id="name" placeholder="Enter name">

    <label>Roll Number</label>
    <input type="number" id="roll" placeholder="Enter roll number">

    <label>Marks (5 Subjects)</label>
    <input type="number" id="m1" placeholder="Subject 1">
    <input type="number" id="m2" placeholder="Subject 2">
    <input type="number" id="m3" placeholder="Subject 3">
    <input type="number" id="m4" placeholder="Subject 4">
    <input type="number" id="m5" placeholder="Subject 5">

    <div class="btn-group">
      <button class="add-btn" onclick="addStudent()">Add Student</button>
      <button class="clear-btn" onclick="clearData()">Clear Data</button>
    </div>

    <table id="resultTable">
      <thead>
        <tr>
          <th>Roll</th>
          <th>Name</th>
          <th>GPA</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script>
    // 🚨 Always start fresh (no previous data)
    localStorage.removeItem("students");

    let students = [];

    function calculateGPA(marks) {
      let total = marks.reduce((a, b) => a + b, 0);
      return (total / 5 / 10).toFixed(2);
    }

    function addStudent() {
      let name = document.getElementById("name").value.trim();
      let roll = document.getElementById("roll").value.trim();

      let m1 = document.getElementById("m1").value;
      let m2 = document.getElementById("m2").value;
      let m3 = document.getElementById("m3").value;
      let m4 = document.getElementById("m4").value;
      let m5 = document.getElementById("m5").value;

      if (!name || !roll || !m1 || !m2 || !m3 || !m4 || !m5) {
        alert("Please fill all fields!");
        return;
      }

      let marks = [Number(m1), Number(m2), Number(m3), Number(m4), Number(m5)];

      if (marks.some(m => m < 0 || m > 100)) {
        alert("Marks must be between 0 and 100!");
        return;
      }

      let gpa = calculateGPA(marks);

      let student = { name, roll, gpa };
      students.push(student);

      displayStudents();

      document.querySelectorAll("input").forEach(i => i.value = "");
    }

    function displayStudents() {
      let tbody = document.querySelector("#resultTable tbody");
      tbody.innerHTML = "";

      students.forEach(s => {
        let row = `<tr>
          <td>${s.roll}</td>
          <td>${s.name}</td>
          <td>${s.gpa}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    function clearData() {
      students = [];
      displayStudents();
    }
  </script>

</body>
</html>
